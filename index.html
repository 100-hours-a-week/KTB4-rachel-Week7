<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바닐라 JS SPA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="global-header" data-auth="user">
        <div class="header-container">
            <button type="button" id="headerBackBtn" class="btn-back">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            
            <h1 class="header-title">아무 말 대잔치</h1>
            
            <div class="header-profile-wrapper">
                <button type="button" id="headerProfileBtn" class="btn-profile">
                    <img src="./images/default-profile.png" alt="기본프로필" class="profile-img">
                </button>
                
                <ul id="headerDropdownMenu" class="header-dropdown hidden">
                    <li><button type="button" id="menuEditInfo">회원정보수정</button></li>
                    <li><button type="button" id="menuEditPwd">비밀번호수정</button></li>
                    <li><button type="button" id="menuLogout">로그아웃</button></li>
                </ul>
            </div>
        </div>
    </nav>


    <nav class="navbar" data-auth="guest">
        <a href="/" class="nav-link">Home</a>
        <a href="/about" class="nav-link">About</a>
    </nav>

    <main id="app">화면 로딩 중...</main>

    <script type="module" src="./main.js"></script>
</body>
</html>
